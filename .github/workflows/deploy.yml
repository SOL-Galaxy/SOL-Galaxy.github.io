name: Build and Push to dist Branch

on:
  # 在推送到 main 分支时触发
  push:
    branches:
      - main
  
  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: write

jobs:
  # 构建并推送任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 需要完整历史用于 Git Changelog
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --force

      - name: Build with VitePress
        run: npm run VitePress:build

      - name: Deploy to dist branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 获取或创建 dist 分支
          git fetch origin dist:dist || git checkout --orphan dist
          git checkout dist
          
          # 清空当前分支内容（保留 .git）
          git rm -rf . || true
          
          # 复制构建产物（包括隐藏文件）
          cp -r Config/.vitepress/dist/* Config/.vitepress/dist/.* . 2>/dev/null || :
          
          # 提交并推送
          git add -A
          git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin dist
